<!DOCTYPE html>
<html>
<head>
    <title>Sign-In - My Online Shop</title>
    <style>
        body {
            background-color: #0f172a; /* Deep Navy */
            font-family: Arial;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .signin-box {
            background-color: #1e293b; /* Dark Navy Card */
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 300px;
            border: 1px solid #38bdf8; /* Blue Border */
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            background-color: #38bdf8; /* Sky Blue */
            color: #0f172a;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: white;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="signin-box">
        <h2 style="color: #38bdf8;">Sign-In</h2>
